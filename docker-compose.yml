version: "3"

services:
  gettem:
    build: 
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        REACT_APP_STRAPI_URL: ${STRAPI_URL}
        REACT_APP_STRAPI_AUTH_TOKEN: ${STRAPI_AUTH_TOKEN}
        REACT_APP_ANALYTICS_URL: ${ANALYTICS_URL:-http://localhost:8081}
    ports:
      - '3000:3000'
    volumes:
       - ./frontend:/gettem
       - /node_modules
    environment:
       - CHOKIDAR_USEPOLLING=true
    command: sh -c "
        npm rebuild node-sass
        && yarn; yarn start"

  strapi:
    build: 
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_NAME: gettem
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: juna
      DATABASE_PASSWORD: gettem
      URL: ${URL:-http://localhost:1337}
      STRAPI_URL: ${STRAPI_URL:-http://localhost:1337}
      APP_KEYS: ${APP_KEYS}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
    volumes:
      - ./backend:/app
    ports:
      - '1337:1337'
    depends_on:
      - postgres

  postgres:
    image: postgres:14
    environment:
      POSTGRES_PASSWORD: gettem
      POSTGRES_USER: juna
      POSTGRES_DB: gettem
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  analytics-operator:
    build:
      context: ./analytics
      dockerfile: cmd/operator/Dockerfile
    ports:
      - '8081:8081'
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USERNAME: juna
      DATABASE_PASSWORD: gettem
      DATABASE_NAME: gettem
      DATABASE_SSL_MODE: disable
      AGGREGATION_INTERVAL: ${AGGREGATION_INTERVAL:-24h}
      RETENTION_DAYS: ${RETENTION_DAYS:-7}
      INGEST_ADDR: ":8081"
      CORS_ORIGINS: "http://localhost:3000"
    depends_on:
      - postgres
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    user: "472"
    ports:
      - '3001:3000'
    environment:
      GF_DEFAULT_APP_MODE: development
      GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS: gettem-analytics-app
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_PLUGIN_GETTEM_ANALYTICS_APP_DATABASE_HOST: postgres
      GF_PLUGIN_GETTEM_ANALYTICS_APP_DATABASE_PORT: "5432"
      GF_PLUGIN_GETTEM_ANALYTICS_APP_DATABASE_USERNAME: juna
      GF_PLUGIN_GETTEM_ANALYTICS_APP_DATABASE_PASSWORD: gettem
      GF_PLUGIN_GETTEM_ANALYTICS_APP_DATABASE_NAME: gettem
      GF_PLUGIN_GETTEM_ANALYTICS_APP_DATABASE_SSL_MODE: disable
    volumes:
      - ./analytics/plugin/dist:/var/lib/grafana/plugins/gettem-analytics-app
      - ./grafana-data:/var/lib/grafana
    depends_on:
      - postgres
    restart: unless-stopped
